# Hyprspace starter config.
#
# This file is intentionally small. Hyprspace already provides opinionated built-in
# defaults for the dwindle-friendly layout behavior, so this file only contains the
# first shortcuts new users are likely to want immediately.
#
# For a fuller reference config, see: ~/.config/hyprspace/docs/default-config.toml
# For path rules, see: ~/.config/hyprspace/docs/README.md
# For all available config options and commands, see:
# https://nikitabobko.github.io/AeroSpace/guide
# https://nikitabobko.github.io/AeroSpace/commands

config-version = 2
start-at-login = true

after-startup-command = [
    'exec-and-forget borders active_color=0xff50bfcb inactive_color=0xff414550 width=8.0 hidpi=off',
]

exec-on-workspace-change = [
    '/bin/bash',
    '-lc',
    'sketchybar --trigger hyprspace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE',
]

[gaps]
inner.horizontal = 18
inner.vertical = 18
outer.left = 18
outer.right = 18
outer.bottom = 18
outer.top = [{ monitor."built-in" = 18 }, { monitor."main" = 48 }, 48]

# ---------- MAIN KEY BINDINGS -----------

[mode.main.binding]
cmd-alt-ctrl-enter = 'new-window-or-open Terminal.app'
cmd-alt-ctrl-b = 'new-window-or-open Safari'
cmd-alt-ctrl-m = 'new-window-or-open Spotify'
cmd-alt-ctrl-shift-p = 'open-terminal Terminal.app btop'

cmd-alt-ctrl-1 = 'workspace 1'
cmd-alt-ctrl-2 = 'workspace 2'
cmd-alt-ctrl-3 = 'workspace 3'
cmd-alt-ctrl-4 = 'workspace 4'
cmd-alt-ctrl-5 = 'workspace 5'
cmd-alt-ctrl-6 = 'workspace 6'
cmd-alt-ctrl-7 = 'workspace 7'
cmd-alt-ctrl-8 = 'workspace 8'
cmd-alt-ctrl-9 = 'workspace 9'

cmd-alt-ctrl-shift-1 = 'move-node-to-workspace 1'
cmd-alt-ctrl-shift-2 = 'move-node-to-workspace 2'
cmd-alt-ctrl-shift-3 = 'move-node-to-workspace 3'
cmd-alt-ctrl-shift-4 = 'move-node-to-workspace 4'
cmd-alt-ctrl-shift-5 = 'move-node-to-workspace 5'
cmd-alt-ctrl-shift-6 = 'move-node-to-workspace 6'
cmd-alt-ctrl-shift-7 = 'move-node-to-workspace 7'
cmd-alt-ctrl-shift-8 = 'move-node-to-workspace 8'
cmd-alt-ctrl-shift-9 = 'move-node-to-workspace 9'

cmd-alt-ctrl-h = 'focus left'
cmd-alt-ctrl-j = 'focus down'
cmd-alt-ctrl-k = 'focus up'
cmd-alt-ctrl-l = 'focus right'

cmd-alt-ctrl-shift-h = 'move left'
cmd-alt-ctrl-shift-j = 'move down'
cmd-alt-ctrl-shift-k = 'move up'
cmd-alt-ctrl-shift-l = 'move right'

cmd-alt-ctrl-tab = 'focus-back-and-forth'
cmd-alt-ctrl-shift-space = 'layout floating tiling'
cmd-alt-ctrl-shift-semicolon = 'mode service'
cmd-alt-ctrl-shift-slash = 'layout tiles horizontal vertical'
cmd-alt-ctrl-shift-comma = 'layout accordion horizontal vertical'
cmd-alt-ctrl-minus = 'resize smart -50'
cmd-alt-ctrl-equal = 'resize smart +50'
cmd-alt-ctrl-shift-f = 'fullscreen'
cmd-alt-ctrl-f = 'macos-native-fullscreen'

# ---------- SERVICE MODE -----------

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
alt-shift-semicolon = 'mode main'

# ---------- WINDOW CONTROL -----------

[[on-window-detected]]
if.app-id = "com.apple.ScreenSharing"
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.apple.MobileSMS"
run = ["layout floating"]

[[on-window-detected]]
if.app-id = 'com.apple.iphonesimulator'
run = ["layout floating"]

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = ['layout floating']

[[on-window-detected]]
if.app-id = "com.microsoft.teams2"
run = ["layout floating"]

[[on-window-detected]]
if.app-id = 'com.macpaw.CleanMyMac'
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.macpaw.CleanMyMac4"
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.bitwarden.desktop"
run = ["layout floating"]

[[on-window-detected]]
if.app-id = "com.apple.QuickTimePlayerX"
run = ["layout floating"]
